<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Borrowed Books</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Borrowed Books</h2>

    <!-- NAV -->
    <div class="mb-3 text-center">
        <a th:href="@{/books}" class="btn btn-primary btn-sm">Books</a>
        <a th:href="@{/loans}" class="btn btn-secondary btn-sm">Borrowed</a>
        <a th:href="@{/loans/history}" class="btn btn-dark btn-sm">History</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(loans)}" class="alert alert-info text-center">
        No borrowed books.
    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-striped" th:if="${!#lists.isEmpty(loans)}">

        <thead class="table-dark">
        <tr>
            <th>Book</th>
            <th>Borrow Date</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="loan : ${loans}">
            <td th:text="${loan.book.title}"></td>
            <td th:text="${loan.borrowDate}"></td>
            <td th:text="${loan.dueDate}"></td>
            <td>
                <span th:text="${loan.status}"
                      th:classappend="${loan.status == 'RETURNED'} ? 'text-success' : 'text-warning'">
                </span>
            </td>
            <td>
                <a th:href="@{/loans/return/{id}(id=${loan.id})}"
                   class="btn btn-danger btn-sm">
                    Return
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
