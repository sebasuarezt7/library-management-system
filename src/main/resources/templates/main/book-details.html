<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Book Details</h2>

    <!-- NAV -->
    <div class="mb-3">
        <a th:href="@{/books}" class="btn btn-secondary btn-sm">Back</a>
        <a th:href="@{/loans}" class="btn btn-primary btn-sm">Borrowed</a>
        <a th:href="@{/loans/history}" class="btn btn-dark btn-sm">History</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <!-- CONTENT -->
    <div th:if="${book != null}" class="card p-4 shadow-sm">

        <p><strong>Title:</strong> <span th:text="${book.title}"></span></p>
        <p><strong>Author:</strong> <span th:text="${book.author}"></span></p>
        <p><strong>ISBN:</strong> <span th:text="${book.isbn}"></span></p>
        <p><strong>Published Year:</strong> <span th:text="${book.publishedYear}"></span></p>
        <p><strong>Quantity:</strong> <span th:text="${book.quantity}"></span></p>
        <p><strong>Available:</strong> <span th:text="${book.availableQuantity}"></span></p>
        <p><strong>Category:</strong> <span th:text="${book.category.name}"></span></p>

        <!-- ACTIONS -->
        <div class="mt-3">

            <!-- USER -->
            <div th:if="${loggedUser.role == 'USER' and book.availableQuantity > 0}">
                <a th:href="@{/loans/borrow/{id}(id=${book.id})}" class="btn btn-success">
                    Borrow Book
                </a>
            </div>

            <!-- ADMIN -->
            <div th:if="${loggedUser.role == 'ADMIN'}">
                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-warning">
                    Edit
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
