<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Add Book</h2>

    <div class="mb-3">
        <a th:href="@{/books}" class="btn btn-secondary btn-sm">Back to Books</a>
    </div>

    <form th:action="@{/books/add}" th:object="${book}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" th:field="*{author}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Published Year</label>
            <input type="number" th:field="*{publishedYear}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Available Quantity</label>
            <input type="number" th:field="*{availableQuantity}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category.id}" class="form-select" required>
                <option value="">Select Category</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Book</button>

    </form>

</div>

</body>
</html>
